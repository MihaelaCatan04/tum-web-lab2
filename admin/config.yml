backend:
  name: git-gateway
  branch: master

media_folder: "img"
public_folder: "/img"

collections:

  - name: "site_settings"
    label: "Setări generale"
    files:
      - name: "contact"
        label: "Contact"
        file: "_data/contact.yaml"
        fields:
          - { label: "Text introducere", name: "intro_text", widget: "text" }
          - { label: "Telefon (afișat)", name: "phone_display", widget: "string" }
          - { label: "Telefon (link tel:)", name: "phone_raw", widget: "string" }
          - { label: "Email", name: "email", widget: "string" }

  - name: "home_section"
    label: "Secțiunea Acasă"
    files:
      - name: "home"
        label: "Acasă"
        file: "_data/home.yaml"
        fields:
          - { label: "Text introductiv", name: "intro_text", widget: "text" }

  - name: "services_data"
    label: "Servicii"
    files:
      - name: "services"
        label: "Lista serviciilor"
        file: "_data/services.yaml"
        fields:
          - label: "Servicii"
            name: "items"
            widget: "list"
            summary: "{{fields.description}}"
            fields:
              - label: "Iconiță Lucide"
                name: "icon"
                widget: "select"
                options:
                  - { label: "Picături (ulei)", value: "droplets" }
                  - { label: "Roată", value: "circle-dot" }
                  - { label: "Mașină (față)", value: "car-front" }
                  - { label: "Motor", value: "waypoints" }
                  - { label: "Baterie", value: "battery-charging" }
                  - { label: "AC", value: "wind" }
                  - { label: "Cheie", value: "wrench" }
                  - { label: "Unelte", value: "settings" }
              - { label: "Descriere", name: "description", widget: "text" }
              - { label: "Titlu serviciu", name: "title", widget: "string" }
              - label: "Indisponibil"
                name: "unavailable"
                widget: "boolean"
                default: false
                options:
                  - { label: "Da", value: true }
                  - { label: "Nu", value: false }

  - name: "about_section"
    label: "Despre noi"
    files:
      - name: "about"
        label: "Conținut Despre noi"
        file: "_data/about.yaml"
        fields:
          - { label: "Text introducere", name: "intro_text", widget: "text" }
          - label: "Motive (bullets)"
            name: "bullets"
            widget: "list"
            summary: "{{fields.text}}"
            fields:
              - { label: "Text", name: "text", widget: "string" }
          - label: "Statistici"
            name: "stats"
            widget: "list"
            summary: "{{fields.value}} – {{fields.label}}"
            fields:
              - { label: "Valoare (ex: 30+)", name: "value", widget: "string" }
              - { label: "Etichetă", name: "label", widget: "string" }

  - name: "reviews_data"
    label: "Recenzii"
    files:
      - name: "reviews"
        label: "Lista recenziilor"
        file: "_data/reviews.yaml"
        fields:
          - label: "Recenzii"
            name: "items"
            widget: "list"
            summary: "{{fields.name}} – {{fields.quote}}"
            fields:
              - { label: "Numele clientului", name: "name", widget: "string" }
              - label: "Rating"
                name: "rating"
                widget: "select"
                options:
                  - { label: "★★★★★ (5)", value: 5 }
                  - { label: "★★★★ (4)", value: 4 }
                  - { label: "★★★ (3)", value: 3 }
                  - { label: "★★ (2)", value: 2 }
                  - { label: "★ (1)", value: 1 }
              - { label: "Recenzie", name: "quote", widget: "text" }