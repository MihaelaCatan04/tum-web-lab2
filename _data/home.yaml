intro_text: >
  Oferim servicii auto de înaltă calitate, cu onestitate și profesionalism.
  Tehnicienii noștri experimentați se asigură că vehiculul tău funcționează
  în siguranță și fără probleme. De la întreținere de rutină la reparații
  complexe, toate serviciile noastre sunt competitive ca preț și calitate.
  Satisfacția ta este prioritatea noastră.
